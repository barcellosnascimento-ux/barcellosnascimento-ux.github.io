<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel Administrativo - Cadastro</title>
    <link rel="stylesheet" href="admin.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body class="admin-body">
    <div class="painel-container">
      <a href="index.html" class="link-voltar">⬅ Voltar para a Vitrine</a>

      <h2>Cadastrar Novo Produto</h2>

      <div class="usuario-logado">
        <p>Operador: <span id="nome-usuario">Carregando...</span></p>
        <button onclick="sairDoSistema()" class="btn-sair">
          Sair do Sistema
        </button>
      </div>

      <div class="form-grupo">
        <label for="input-nome">Nome do Produto:</label>
        <input type="text" id="input-nome" placeholder="Ex: Tênis Nike Air" />
      </div>

      <div class="form-grupo">
        <label for="input-preco">Preço (Use ponto para centavos):</label>
        <input
          type="text"
          id="input-preco"
          step="0.01"
          min="0"
          placeholder="Ex: 199.90"
        />
      </div>

      <div class="form-grupo">
        <label for="input-imagem">Caminho da Imagem:</label>
        <input type="text" id="input-imagem" placeholder="Ex: img/tenis.png" />
      </div>

      <button onclick="cadastrarProduto()">Salvar no Banco</button>

      <p id="mensagem-aviso"></p>
    </div>

    <script src="admin.js"></script>
  </body>
</html>
