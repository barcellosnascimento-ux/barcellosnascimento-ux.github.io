<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Administrativo - Minha Loja</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="login.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body class="login-body">
    <div class="login-wrapper">
      <div class="login-container">
        <div class="login-header">
          <div class="admin-icon">🔐</div>
          <h2>Painel do Lojista</h2>
          <p>Insira suas credenciais para gerenciar a loja</p>
        </div>

        <div class="login-form">
          <div class="input-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="exemplo@email.com" />
          </div>

          <div class="input-group">
            <label for="password">Senha</label>
            <div class="senha-wrapper">
              <input type="password" id="password" placeholder="••••••••" />
              <button
                type="button"
                onclick="mostrarSenha()"
                id="btn-olho"
                title="Mostrar/Esconder"
              >
                👁️
              </button>
            </div>
          </div>

          <button onclick="fazerLogin()" id="btn-entrar">Acessar Painel</button>

          <p id="mensagem"></p>
        </div>

        <div class="login-footer">
          <a href="index.html">← Voltar para a loja</a>
        </div>
      </div>
    </div>
    <script src="login.js"></script>
  </body>
</html>
